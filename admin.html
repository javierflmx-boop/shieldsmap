<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ShieldsMap — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0d0d0d;--muted:#6b6b6b;--muted2:#9a9a9a;
  --border:#e8e8e8;--bg:#f7f8fa;--white:#fff;
  --safe:#16a34a;--warn:#d97706;--danger:#dc2626;
  --safe-bg:#f0fdf4;--warn-bg:#fffbeb;--danger-bg:#fef2f2;
  --gold:#f59e0b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* NAV */
.nav{background:var(--ink);padding:0 20px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Instrument Serif',serif;font-size:18px;color:#fff;flex:1}
.nav-logo em{font-style:italic;color:#ef4444}
.nav-badge{background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:32px;width:360px;max-width:100%}
.login-title{font-family:'Instrument Serif',serif;font-size:24px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.fi{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--ink)}
.err{background:var(--danger-bg);border:1px solid #fca5a5;border-radius:7px;padding:9px 12px;font-size:12px;color:var(--danger);margin-bottom:12px;display:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-ink{background:var(--ink);color:#fff;width:100%}
.btn-safe{background:var(--safe);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
.btn-warn{background:var(--warn);color:#fff}
.btn:active{opacity:.8}

/* MAIN */
.main{padding:16px;max-width:600px;margin:0 auto}

/* TABS */
.tabs{display:flex;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px;gap:3px}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .15s;color:var(--muted)}
.tab.active{background:var(--ink);color:#fff}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-n{font-family:'Instrument Serif',serif;font-size:28px;line-height:1}
.stat-n.pending{color:var(--warn)}
.stat-n.approved{color:var(--safe)}
.stat-n.users{color:var(--ink)}
.stat-l{font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* REPORT CARDS */
.report-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.rc-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.rc-status{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.rc-status.r{color:var(--danger)}
.rc-status.y{color:var(--warn)}
.rc-status.g{color:var(--safe)}
.rc-status.pending{color:var(--warn)}
.rc-addr{font-family:'Instrument Serif',serif;font-size:17px;line-height:1.2;margin-bottom:3px}
.rc-meta{font-size:11px;color:var(--muted)}
.rc-body{padding:12px 14px;border-bottom:1px solid var(--border)}
.rc-comment{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:8px}
.rc-chips{display:flex;gap:6px;flex-wrap:wrap}
.rc-chip{font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--muted);font-weight:600}
.rc-chip.loss{background:var(--danger-bg);color:var(--danger);border-color:#fca5a5}
.rc-actions{padding:10px 14px;display:flex;gap:8px}
.rc-actions .btn{flex:1;padding:10px}

/* USER CARDS */
.user-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.user-avatar{width:38px;height:38px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-tier{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.user-tier.free{background:var(--bg);color:var(--muted2);border:1px solid var(--border)}
.user-tier.premium{background:#fffbeb;color:var(--gold);border:1px solid #fde68a}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.empty-sub{font-size:13px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;border-radius:100px;padding:10px 20px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* SECTION HEADER */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:13px;font-weight:800;color:var(--ink)}
.section-count{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Shields<em>Map</em></div>
  <div class="nav-badge" id="navBadge">Admin Panel</div>
  <button class="btn btn-outline" style="padding:5px 12px;font-size:11px;color:#fff;border-color:rgba(255,255,255,.3)" id="signoutBtn" onclick="handleSignout()" style="display:none">Sign Out</button>
</nav>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-title">Admin Login</div>
    <div class="login-sub">ShieldsMap admin access only.</div>
    <div class="err" id="login-err"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="l-email" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="l-pass" type="password" placeholder="Password" autocomplete="current-password"></div>
    <button class="btn btn-ink" onclick="handleLogin()" style="margin-top:4px">Sign In →</button>
  </div>
</div>

<!-- MAIN PANEL -->
<div class="main" id="mainPanel" style="display:none">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-n pending" id="st-pending">0</div><div class="stat-l">Pending</div></div>
    <div class="stat-card"><div class="stat-n approved" id="st-approved">0</div><div class="stat-l">Live</div></div>
    <div class="stat-card"><div class="stat-n users" id="st-users">0</div><div class="stat-l">Users</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('pending',this)">⏳ Pending</div>
    <div class="tab" onclick="switchTab('approved',this)">✅ Live</div>
    <div class="tab" onclick="switchTab('users',this)">👥 Users</div>
  </div>

  <!-- PENDING REPORTS -->
  <div id="tab-pending">
    <div class="section-head">
      <div class="section-title">Reports waiting for your approval</div>
      <div class="section-count" id="pending-count"></div>
    </div>
    <div id="pending-list"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- APPROVED REPORTS -->
  <div id="tab-approved" style="display:none">
    <div class="section-head">
      <div class="section-title">Live reports on the map</div>
      <div class="section-count" id="approved-count"></div>
    </div>
    <div id="approved-list"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

  <!-- USERS -->
  <div id="tab-users" style="display:none">
    <div class="section-head">
      <div class="section-title">Registered users</div>
      <div class="section-count" id="users-count"></div>
    </div>
    <div id="users-list"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_EMAIL = 'javierflmx@me.com';

var currentUser = null;
var allReports = [];
var allUsers = [];
var supa = null;

// ── INIT ──
window.onload = function(){
  // Init supabase
  try {
    supa = window.supabase.createClient(
      'https://uysgdhjbtstuwowtkmvi.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2dkaGpidHN0dXdvd3RrbXZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODgwODQsImV4cCI6MjA4OTk2NDA4NH0.THlq-dYcnO7CzHXKRk337zbGL46MDE0hlc4FcuaUYKU'
    );
    initAdmin();
  } catch(e) {
    document.getElementById('login-err').textContent = 'Error: '+e.message;
    document.getElementById('login-err').style.display = 'block';
  }
};

async function initAdmin(){
  const { data: { session } } = await supa.auth.getSession();
  if(session){
    currentUser = session.user;
    if(currentUser.email !== ADMIN_EMAIL){
      showLoginError('Access denied. Admin only.');
      await supa.auth.signOut();
      return;
    }
    showPanel();
    loadAll();
  }
};

// ── LOGIN ──
async function handleLogin(){
  var email = document.getElementById('l-email').value.trim();
  var pass = document.getElementById('l-pass').value;
  var err = document.getElementById('login-err');
  err.style.display='none';
  if(!email||!pass){ showLoginError('Please enter email and password.'); return; }
  if(email !== ADMIN_EMAIL){ showLoginError('Access denied. Admin only.'); return; }
  const { data, error } = await supa.auth.signInWithPassword({email, password:pass});
  if(error){ showLoginError(error.message); return; }
  currentUser = data.user;
  showPanel();
  loadAll();
}

function showLoginError(msg){
  var err = document.getElementById('login-err');
  err.textContent = msg; err.style.display = 'block';
}

async function handleSignout(){
  await supa.auth.signOut();
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('mainPanel').style.display = 'none';
}

function showPanel(){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  document.getElementById('signoutBtn').style.display = 'block';
}

// ── LOAD ALL DATA ──
async function loadAll(){
  await Promise.all([loadReports(), loadUsers()]);
}

async function loadReports(){
  try {
    var result = await supa.from('reports').select('*').order('created_at', {ascending:false});
    if(result.error) {
      console.log('Reports error:', result.error);
      document.getElementById('pending-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Connection error</div><div class="empty-sub">'+result.error.message+'</div></div>';
      return;
    }
    allReports = result.data || [];
    updateStats();
    renderTab('pending');
  } catch(e) {
    console.log('Load reports error:', e);
    document.getElementById('pending-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading reports</div><div class="empty-sub">'+e.message+'</div></div>';
  }
}

async function loadUsers(){
  // Try profiles first
  var result = await supa.from('profiles').select('*').order('created_at', {ascending:false});
  allUsers = result.data || [];
  
  // If profiles empty, try to get count from reports by user_id
  if(allUsers.length === 0) {
    var rResult = await supa.from('reports').select('user_id').not('user_id', 'is', null);
    var uniqueUsers = [];
    if(rResult.data) {
      var seen = {};
      rResult.data.forEach(function(r){
        if(r.user_id && !seen[r.user_id]){
          seen[r.user_id] = true;
          uniqueUsers.push({id:r.user_id, full_name:'Contractor', trade:'Unknown', tier:'free'});
        }
      });
      allUsers = uniqueUsers;
    }
  }
  
  document.getElementById('st-users').textContent = allUsers.length;
  document.getElementById('users-count').textContent = allUsers.length + ' total';
  renderUsers();
}

function updateStats(){
  var pending = allReports.filter(function(r){return !r.is_approved}).length;
  var approved = allReports.filter(function(r){return r.is_approved}).length;
  document.getElementById('st-pending').textContent = pending;
  document.getElementById('st-approved').textContent = approved;
  document.getElementById('pending-count').textContent = pending + ' waiting';
  document.getElementById('approved-count').textContent = approved + ' live';
  // Show badge on pending
  document.getElementById('navBadge').textContent = pending > 0 ? pending + ' Pending' : 'Admin';
  document.getElementById('navBadge').style.background = pending > 0 ? 'rgba(220,38,38,.3)' : 'rgba(255,255,255,.15)';
}

// ── TABS ──
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  document.getElementById('tab-pending').style.display = tab==='pending'?'block':'none';
  document.getElementById('tab-approved').style.display = tab==='approved'?'block':'none';
  document.getElementById('tab-users').style.display = tab==='users'?'block':'none';
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='pending') renderReports(false);
  else if(tab==='approved') renderReports(true);
  else renderUsers();
}

// ── RENDER REPORTS ──
function renderReports(approved){
  var list = allReports.filter(function(r){return r.is_approved === approved});
  var container = document.getElementById(approved ? 'approved-list' : 'pending-list');
  var statusLabel = {red:'🚨 Danger', yellow:'⚠️ Caution', green:'✅ Safe'};
  var cls = {red:'r', yellow:'y', green:'g'};

  if(!list.length){
    container.innerHTML = '<div class="empty"><div class="empty-icon">'+(approved?'✅':'⏳')+'</div><div class="empty-title">'+(approved?'No live reports yet':'No pending reports')+'</div><div class="empty-sub">'+(approved?'Approved reports appear here':'When contractors submit reports they appear here')+'</div></div>';
    return;
  }

  var html = '';
  list.forEach(function(r){
    var c = cls[r.status] || 'r';
    var date = new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    html += '<div class="report-card" id="rc-'+r.id+'">' +
      '<div class="rc-head">' +
        '<div class="rc-status '+(approved?c:'pending')+'">'+(approved?statusLabel[r.status]:'⏳ PENDING REVIEW')+'</div>' +
        '<div class="rc-addr">'+(r.full_address||r.address)+', '+r.city+'</div>' +
        '<div class="rc-meta">Submitted '+date+' · '+r.trade+'</div>' +
      '</div>' +
      '<div class="rc-body">' +
        '<div class="rc-comment">'+r.comment+'</div>' +
        '<div class="rc-chips">' +
          (r.owner_name?'<span class="rc-chip">👤 '+r.owner_name+'</span>':'')+
          (r.loss_amount>0?'<span class="rc-chip loss">💸 $'+Number(r.loss_amount).toLocaleString()+' lost</span>':'')+
          '<span class="rc-chip">📍 '+(r.lat?'GPS ✓':'No GPS')+'</span>' +
        '</div>' +
      '</div>' +
      '<div class="rc-actions">';

    if(!approved){
      html += '<button class="btn btn-safe" onclick="approveReport(\''+r.id+'\')">✅ Approve</button>' +
              '<button class="btn btn-warn" onclick="editReport(\''+r.id+'\')">✏️ Edit</button>' +
              '<button class="btn btn-danger" onclick="rejectReport(\''+r.id+'\')">❌ Reject</button>';
    } else {
      html += '<button class="btn btn-outline" style="flex:1" onclick="removeReport(\''+r.id+'\')">Remove from map</button>';
    }

    html += '</div></div>';
  });

  container.innerHTML = html;
}

// ── RENDER USERS ──
function renderUsers(){
  var container = document.getElementById('users-list');
  if(!allUsers.length){
    container.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No users yet</div><div class="empty-sub">Users appear here when they sign up</div></div>';
    return;
  }
  var html = '';
  allUsers.forEach(function(u){
    var tradeEmoji = {
      'General Contractor':'👷','Electrician':'🔌','Plumber':'🔧',
      'Landscaper':'🌿','HVAC':'❄️','Painter':'🎨','Roofer':'🏠'
    };
    var emoji = tradeEmoji[u.trade] || '👤';
    html += '<div class="user-card">' +
      '<div class="user-avatar">'+emoji+'</div>' +
      '<div class="user-info">' +
        '<div class="user-name">'+(u.full_name||'Unknown')+'</div>' +
        '<div class="user-email">'+(u.trade||'No trade')+'</div>' +
      '</div>' +
      '<div>' +
        '<div class="user-tier '+(u.tier||'free')+'">'+(u.tier||'free')+'</div>' +
        (u.tier!=='premium'?'<button class="btn btn-outline" style="margin-top:6px;padding:4px 10px;font-size:10px;width:100%" onclick="makePremium(\''+u.id+'\')">→ Premium</button>':'') +
      '</div>' +
    '</div>';
  });
  container.innerHTML = html;
}

// ── ACTIONS ──
async function approveReport(id){
  var btn = event.target;
  btn.textContent = 'Approving…'; btn.disabled = true;
  const { error } = await supa.from('reports').update({is_approved:true}).eq('id',id);
  if(error){ showToast('❌ Error: '+error.message); btn.textContent='✅ Approve'; btn.disabled=false; return; }
  allReports = allReports.map(function(r){ return r.id===id ? {...r, is_approved:true} : r; });
  updateStats();
  renderReports(false);
  showToast('✅ Report approved — live on the map!');
}

async function rejectReport(id){
  if(!confirm('Delete this report permanently?')) return;
  const { error } = await supa.from('reports').delete().eq('id',id);
  if(error){ showToast('❌ Error: '+error.message); return; }
  allReports = allReports.filter(function(r){ return r.id!==id; });
  updateStats();
  renderReports(false);
  showToast('🗑️ Report deleted.');
}

async function removeReport(id){
  if(!confirm('Remove this report from the map?')) return;
  const { error } = await supa.from('reports').update({is_approved:false}).eq('id',id);
  if(error){ showToast('❌ Error: '+error.message); return; }
  allReports = allReports.map(function(r){ return r.id===id ? {...r, is_approved:false} : r; });
  updateStats();
  renderReports(true);
  showToast('Report removed from map.');
}

function editReport(id){
  var r = allReports.find(function(x){return x.id===id});
  if(!r) return;
  var newComment = prompt('Edit report comment:', r.comment);
  if(!newComment) return;
  supa.from('reports').update({comment:newComment}).eq('id',id).then(function(){
    allReports = allReports.map(function(x){ return x.id===id ? {...x, comment:newComment} : x; });
    renderReports(false);
    showToast('✏️ Report updated.');
  });
}

async function makePremium(userId){
  const { error } = await supa.from('profiles').update({tier:'premium'}).eq('id',userId);
  if(error){ showToast('❌ Error: '+error.message); return; }
  allUsers = allUsers.map(function(u){ return u.id===userId ? {...u, tier:'premium'} : u; });
  renderUsers();
  showToast('⭐ User upgraded to Premium!');
}

// ── TOAST ──
var tt;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tt); tt=setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
</body>
</html>
